apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-campaign
  namespace: hackathon-9nett
  labels:
    app: identity-campaign
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-campaign
  template:
    metadata:
      labels:
        app: identity-campaign
    spec:
      containers:
        - name: identity-campaign
          image: identity-campaign:v2
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Kubernetes"

          envFrom:
            - configMapRef:
                name: identity-campaign-config

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"